name: Build and Deploy to AKS

on:
  push:
    branches:
      - "main"

# only single deployment will happen at a time, rest will cancel
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java setup
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      # 3. Build app
      - name: Build with Gradle
        run: ./gradlew build

      # 4. Azure Login
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 5. ACR Login
      - name: Login to ACR
        run: |
          az acr login --name InterviewResgistry

      # 6. Build & Push Docker image
      - name: Build and Push Docker Image
        run: |
          docker build -t interviewresgistry.azurecr.io/interview-app-image:${{ github.sha }} .
          docker push interviewresgistry.azurecr.io/interview-app-image:${{ github.sha }}
          
      # 7. Set AKS context
      - name: Set AKS Context
        uses: azure/aks-set-context@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          cluster-name: InterviewCluster
          resource-group: interview-resources

      # 8. Deploy using Helm
      - name: Deploy with Helm
        run: |
          helm upgrade --install interviewapp ./helm/interview-app \
            --set image.tag=${{ github.sha }}

      # 9. Verify rollout
      - name: Check rollout status
        run: |
          kubectl rollout status deployment/interviewapp-deployment --timeout=120s

      # 10. Rollback if deployment fails
      - name: Rollback if deployment fails
        if: failure()
        run: |
          echo "Deployment failed. Rolling back..."
          helm rollback interviewapp

      # 11. Verify rollback
      - name: Verify rollback
        if: failure()
        run: |
          kubectl rollout status deployment/interviewapp-deployment --timeout=120s