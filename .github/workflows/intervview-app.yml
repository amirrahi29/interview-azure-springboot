name: Build and Deploy to AKS

on:
  push:
    branches:
      - dev
      - staging
      - uat
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java setup
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      # 3. Build app
      - name: Build with Gradle
        run: ./gradlew build

      # 4. Azure Login
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 5. ACR Login
      - name: Login to ACR
        run: az acr login --name InterviewResgistry

      # 6. Build & Push Docker image
      - name: Build and Push Docker Image
        run: |
          docker build -t interviewresgistry.azurecr.io/interview-app-image:${{ github.sha }} .
          docker push interviewresgistry.azurecr.io/interview-app-image:${{ github.sha }}

      # 7. ENV AUTO DETECT
      - name: Set Environment
        run: |
          BRANCH=${GITHUB_REF##*/}
          if [ "$BRANCH" = "dev" ]; then
            echo "ENV=dev" >> $GITHUB_ENV
          elif [ "$BRANCH" = "staging" ]; then
            echo "ENV=staging" >> $GITHUB_ENV
          elif [ "$BRANCH" = "uat" ]; then
            echo "ENV=uat" >> $GITHUB_ENV
          else
            echo "ENV=prod" >> $GITHUB_ENV
          fi

      # 8. Set AKS context
      - name: Set AKS Context
        uses: azure/aks-set-context@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          cluster-name: InterviewCluster
          resource-group: interview-resources

      # 9. Helm Deploy (ENV BASED)
      - name: Deploy with Helm
        run: |
          helm upgrade --install interviewapp-${ENV} ./helm/interview-app \
            -f helm/interview-app/values-${ENV}.yaml \
            --set image.tag=${{ github.sha }} \
            --namespace ${ENV} --create-namespace

      # 10. Verify rollout
      - name: Check rollout status
        run: |
          kubectl rollout status deployment/interviewapp-deployment \
            --namespace ${ENV} --timeout=120s

      # 11. Rollback if deployment fails
      - name: Rollback if deployment fails
        if: failure()
        run: |
          helm rollback interviewapp-${ENV} --namespace ${ENV}

      # 12. Verify rollback
      - name: Verify rollback
        if: failure()
        run: |
          kubectl rollout status deployment/interviewapp-deployment \
            --namespace ${ENV} --timeout=120s