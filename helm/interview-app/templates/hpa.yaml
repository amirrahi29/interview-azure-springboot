apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: interviewapp-hpa

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: interviewapp-deployment

  minReplicas: {{ .Values.hpa.min }}
  maxReplicas: {{ .Values.hpa.max }}

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 60

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70