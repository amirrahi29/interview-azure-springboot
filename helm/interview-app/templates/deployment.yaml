apiVersion: apps/v1
kind: Deployment
metadata:
  name: interviewapp-deployment
  labels:
    app: interviewapp

spec:
  replicas: {{ .Values.replicaCount }}

  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: interviewapp

  template:
    metadata:
      labels:
        app: interviewapp

    spec:
      containers:
        - name: interviewapp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8083

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 15
            periodSeconds: 20

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            failureThreshold: 30
            periodSeconds: 5

          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]

      terminationGracePeriodSeconds: 30