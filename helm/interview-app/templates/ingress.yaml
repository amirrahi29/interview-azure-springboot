apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: interviewapp-ingress-{{ .Values.env }}
  namespace: {{ .Values.env }}

spec:
  ingressClassName: nginx

  rules:
    - host: {{ .Values.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: interview-app-service
                port:
                  number: {{ .Values.service.port }}