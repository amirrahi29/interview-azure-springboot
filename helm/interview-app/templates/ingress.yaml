apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: interviewapp-ingress
  namespace: {{ .Values.env }}

spec:
  ingressClassName: nginx

  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: interview-app-service
                port:
                  number: 80