# Production — HA, PDB, anti-affinity; enable TLS when cert-manager / secret exists
environment:
  name: production
  tier: production

replicaCount: 3
env: prod
host: prod.interview.com

image:
  repository: interviewresgistry.azurecr.io/interview-app-image
  tag: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  # After TLS secret exists in namespace:
  # tls:
  #   enabled: true
  #   secretName: prod-interview-com-tls

hpa:
  enabled: true
  min: 3
  max: 6

pdb:
  enabled: true
  minAvailable: 2

podAntiAffinity:
  enabled: true
  type: preferred
  topologyKey: topology.kubernetes.io/zone

deployment:
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: "1000m"
    memory: 1024Mi
