# UAT — business sign-off, closer to production capacity
environment:
  name: uat
  tier: non-production

replicaCount: 2
env: uat
host: uat.interview.com

image:
  repository: interviewresgistry.azurecr.io/interview-app-image
  tag: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx

hpa:
  enabled: true
  min: 2
  max: 6

pdb:
  enabled: true
  minAvailable: 1

podAntiAffinity:
  enabled: true
  type: preferred
  topologyKey: topology.kubernetes.io/zone

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
