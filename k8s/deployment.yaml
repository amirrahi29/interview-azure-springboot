apiVersion: apps/v1
kind: Deployment
metadata:
  name: interviewapp-deployment
  labels:
    app: interviewapp

spec:
  replicas: 2   # initial, HPA will manage scaling

  revisionHistoryLimit: 5   # rollback history

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: interviewapp

  template:
    metadata:
      labels:
        app: interviewapp

    spec:
      containers:
        - name: interviewapp
          image: interviewresgistry.azurecr.io/interview-app-image:latest

          imagePullPolicy: Always   # always pull latest image

          ports:
            - containerPort: 8082

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            failureThreshold: 30
            periodSeconds: 5

          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]

      terminationGracePeriodSeconds: 30